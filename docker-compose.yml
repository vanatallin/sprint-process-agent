version: '3.8'

# Local development services for Sprint Agent
# Run: docker-compose up -d

services:
  # MinIO - S3-compatible object storage for local development
  minio:
    image: minio/minio:latest
    container_name: sprint-agent-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: sprint-agent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/sprint-agent-data --ignore-existing;
      mc anonymous set download local/sprint-agent-data;
      echo 'Bucket sprint-agent-data created successfully';
      exit 0;
      "

volumes:
  minio-data:
    driver: local
